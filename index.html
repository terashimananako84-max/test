<!-- ↓これは最新のHTMLサイトだよとブラウザに共有するための宣言 -->
<!DOCTYPE html>
<!-- ↓HTMLファイルがどの言語で書かれているか -->
<html lang="ja">
<!-- ↓情報の管理 -->
<head>
    <!-- ↓文字化けしないための対策 -->
    <meta charset="UTF-8">
    <!-- ↓レスポンシブデザインに対応するための設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ↓Webページのタイトル -->
    <title>ウェブページ</title>
</head>
<!-- ↓Webページの要素（ユーザーに届けたい情報） -->
<body>
    <!-- 見出し（ｈ1‐ｈ6まで） -->
    <h1><strong>ようこそ</strong></h1>
    <h2>こんにちは！またお会いしましたね！！</h2>
    <!-- 段落 -->
    <p>私はＴ１Ａの学生です。</p>
    <!-- リスト -->
     <!-- 黒丸のリスト -->
    <ul>
        <li>て</li>
        <li>ら</li>
    </ul>
    <!-- 数字のリスト -->
    <ol>
        <li>し</li>
        <li>ま</li>
    </ol>
    <!-- 画像の挿入 img src="画像のディレクトリ"　alt="画像が表示されないときの説明" -->
     <a href="indeex.html">
        <img src="/プログラミング/4020/birds.jpg"alt="鳥">
    </a>

</body>

</html>
